name = "rndmadmin"
main = "src/worker.js"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# Static assets configuration using Assets
[assets]
directory = "./frontend"
binding = "ASSETS"

# Custom domain routes
[[routes]]
pattern = "admin.rndmjunk.com/*"
zone_name = "rndmjunk.com"

# Environment variables
[vars]
ENVIRONMENT = "production"
# Production environment variables (set these in Cloudflare dashboard)
# These are placeholders - DO NOT set real values here
# Set actual values in Cloudflare Workers dashboard under Settings > Variables
FIREBASE_API_KEY = ""
FIREBASE_AUTH_DOMAIN = ""
FIREBASE_DATABASE_URL = ""
FIREBASE_PROJECT_ID = ""
FIREBASE_STORAGE_BUCKET = ""
FIREBASE_MESSAGING_SENDER_ID = ""
FIREBASE_APP_ID = ""
FIREBASE_MEASUREMENT_ID = ""

# Development configuration
[env.development]
name = "rndmadmin-dev"
vars = { ENVIRONMENT = "development" }
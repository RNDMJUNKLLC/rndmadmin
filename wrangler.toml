name = "rndmadmin"
main = "src/worker.js"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# Static assets configuration using Assets
[assets]
directory = "./frontend"
binding = "ASSETS"

# Custom domain routes
[[routes]]
pattern = "admin.rndmjunk.com/*"
zone_name = "rndmjunk.com"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Firebase configuration - these will be overridden by Cloudflare Environment Variables
[vars]
FIREBASE_API_KEY = "placeholder"
FIREBASE_AUTH_DOMAIN = "placeholder"
FIREBASE_DATABASE_URL = "placeholder"  
FIREBASE_PROJECT_ID = "placeholder"
FIREBASE_STORAGE_BUCKET = "placeholder"
FIREBASE_MESSAGING_SENDER_ID = "placeholder"
FIREBASE_APP_ID = "placeholder"
FIREBASE_MEASUREMENT_ID = "placeholder"

# Development configuration
[env.development]
name = "rndmadmin-dev"
vars = { ENVIRONMENT = "development" }